<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KNH BDMS — Transfusion Form</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <span class="nav-brand">KNH BDMS</span>
  <a href="index.html">Login</a>
  <a href="register_donor.html">Register Donor</a>
  <a href="donor_portal.html">Donor Portal</a>
  <a href="inventory_dashboard.html">Inventory</a>
  <a href="transfusion_form.html" class="active">Transfusion</a>
</nav>

<div class="container">

  <!-- Compatibility Search -->
  <div class="card">
    <h1>Compatibility Search</h1>
    <p style="color:#555;font-size:0.9rem;margin-bottom:1rem;">
      Find compatible blood units for a patient before recording a transfusion.
    </p>

    <div id="compatAlert" class="alert" role="alert"></div>

    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;">
      <div class="form-group" style="flex:1;min-width:160px;margin-bottom:0;">
        <label for="patientBloodType">Patient Blood Type</label>
        <select id="patientBloodType">
          <option value="">— Select —</option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
      </div>

      <div class="form-group" style="flex:1;min-width:120px;margin-bottom:0;">
        <label for="requestedUnits">Units Requested</label>
        <input type="number" id="requestedUnits" min="1" max="20" value="1" />
      </div>

      <button class="btn btn-primary" id="findCompatBtn" style="height:2.4rem;">
        Find Compatible Units
      </button>
    </div>

    <div id="compatResult" style="margin-top:1rem;"></div>
  </div>

  <!-- Transfusion Recording -->
  <div class="card">
    <h2>Record Transfusion</h2>

    <div id="transfusionAlert" class="alert" role="alert"></div>

    <form id="transfusionForm" novalidate>
      <div class="form-group">
        <label for="blood_unit_id">Blood Unit ID <span style="color:red">*</span></label>
        <input type="text" id="blood_unit_id" name="blood_unit_id"
               placeholder="Enter the blood unit ID" required />
      </div>

      <div class="form-group">
        <label for="patient_identifier">Patient Identifier <span style="color:red">*</span></label>
        <input type="text" id="patient_identifier" name="patient_identifier"
               placeholder="e.g. patient record number" required />
      </div>

      <button type="submit" class="btn btn-primary" id="transfusionSubmitBtn">
        Record Transfusion
      </button>
    </form>
  </div>

</div>

<script>
  // ── Compatibility Search ─────────────────────────────────────────────────────
  const findCompatBtn  = document.getElementById('findCompatBtn');
  const compatAlert    = document.getElementById('compatAlert');
  const compatResult   = document.getElementById('compatResult');

  function showAlert(el, message, type) {
    el.textContent = message;
    el.className   = 'alert show alert-' + type;
  }

  function hideAlert(el) { el.className = 'alert'; }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  findCompatBtn.addEventListener('click', async () => {
    const bloodType = document.getElementById('patientBloodType').value;
    const requested = parseInt(document.getElementById('requestedUnits').value, 10) || 1;

    hideAlert(compatAlert);
    compatResult.innerHTML = '';

    if (!bloodType) {
      showAlert(compatAlert, 'Please select a patient blood type.', 'error');
      return;
    }

    findCompatBtn.disabled    = true;
    findCompatBtn.textContent = 'Searching…';

    try {
      const url = `api/blood_units.php?patient_blood_type=${encodeURIComponent(bloodType)}&requested=${requested}`;
      const res  = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        showAlert(compatAlert, data.error || 'Compatibility search failed.', 'error');
        return;
      }

      renderCompatResult(data, bloodType, requested);
    } catch (err) {
      showAlert(compatAlert, 'Network error. Please check your connection.', 'error');
    } finally {
      findCompatBtn.disabled    = false;
      findCompatBtn.textContent = 'Find Compatible Units';
    }
  });

  function renderCompatResult(data, bloodType, requested) {
    // Handle both a units array response and a plain array
    const units    = data.units || (Array.isArray(data) ? data : []);
    const shortage = data.shortage === true;

    if (!units.length) {
      compatResult.innerHTML = `
        <div class="alert show alert-error">
          No compatible units found for blood type <strong>${escHtml(bloodType)}</strong>.
        </div>`;
      return;
    }

    let html = '';

    if (shortage) {
      html += `<div class="alert show alert-error" style="margin-bottom:0.75rem;">
        ⚠ Shortage: only ${units.length} compatible unit(s) available (${requested} requested).
      </div>`;
    }

    html += `<div class="table-wrap"><table>
      <thead><tr><th>Unit ID</th><th>Blood Type</th><th>Expiry Date</th><th>Status</th></tr></thead>
      <tbody>`;

    units.forEach(u => {
      html += `<tr>
        <td>${escHtml(String(u.id))}</td>
        <td>${escHtml(u.blood_type)}</td>
        <td>${escHtml(u.expiry_date)}</td>
        <td><span class="badge badge-success">${escHtml(u.status || 'available')}</span></td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    compatResult.innerHTML = html;
  }

  // ── Transfusion Recording ────────────────────────────────────────────────────
  const transfusionForm      = document.getElementById('transfusionForm');
  const transfusionAlert     = document.getElementById('transfusionAlert');
  const transfusionSubmitBtn = document.getElementById('transfusionSubmitBtn');

  transfusionForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert(transfusionAlert);

    const blood_unit_id      = document.getElementById('blood_unit_id').value.trim();
    const patient_identifier = document.getElementById('patient_identifier').value.trim();

    if (!blood_unit_id || !patient_identifier) {
      showAlert(transfusionAlert, 'Both Blood Unit ID and Patient Identifier are required.', 'error');
      return;
    }

    transfusionSubmitBtn.disabled    = true;
    transfusionSubmitBtn.textContent = 'Recording…';

    try {
      const res  = await fetch('api/transfusions.php', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ blood_unit_id, patient_identifier }),
      });

      const data = await res.json();

      if (res.ok) {
        const txId = data.transfusion_id || data.id || '—';
        showAlert(transfusionAlert,
          `Transfusion recorded successfully. Transfusion ID: ${txId}`, 'success');
        transfusionForm.reset();
        compatResult.innerHTML = '';
      } else {
        const msg = data.message || data.error || 'Transfusion recording failed.';
        showAlert(transfusionAlert, msg, 'error');
      }
    } catch (err) {
      showAlert(transfusionAlert, 'Network error. Please check your connection.', 'error');
    } finally {
      transfusionSubmitBtn.disabled    = false;
      transfusionSubmitBtn.textContent = 'Record Transfusion';
    }
  });
</script>

</body>
</html>
